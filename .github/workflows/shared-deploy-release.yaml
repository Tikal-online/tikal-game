---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Deploy Release

on:
  workflow_call:
    inputs:
      dockerfile:
        required: true
        type: string
      version:
        required: true
        type: string
      project-name:
        required: true
        type: string

env:
  AZ_REGISTRY: "tikalcontainerregistry.azurecr.io"

jobs:
  deploy-release:
    name: Deploy Release
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          lfs: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to the Azure Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.AZ_REGISTRY }}
          username: ${{ secrets.AZ_SP_CLIENT_ID }}
          password: ${{ secrets.AZ_SP_CLIENT_SECRET }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.AZ_REGISTRY }}/${{ inputs.project-name }}
          tags: |
            type=semver,pattern={{version}},value=${{ inputs.version }}

      - name: Build and Push Image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ${{ inputs.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
