---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Deploy Release

on:
  workflow_call:
    inputs:
      dockerfile:
        required: true
        type: string
      version:
        required: true
        type: string
      project-name:
        required: true
        type: string

env:
  AZ_REGISTRY: "tikalcontainerregistry.azurecr.io"

jobs:
  deploy-release:
    name: Deploy Release
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          lfs: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to the Azure Container Registry
        uses: docker/login-action@06fb636fac595d6fb4b28a5dfcb21a6f5091859c # v4.5.0
        with:
          registry: ${{ env.AZ_REGISTRY }}
          username: ${{ secrets.AZ_SP_CLIENT_ID }}
          password: ${{ secrets.AZ_SP_CLIENT_SECRET }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.AZ_REGISTRY }}/${{ inputs.project-name }}
          tags: |
            type=semver,pattern={{version}},value=${{ inputs.version }}

      - name: Build and Push Image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ${{ inputs.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
