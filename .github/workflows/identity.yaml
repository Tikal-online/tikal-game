---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Identity CI/CD

on:
  push:
    branches:
      - main
    paths:
      - Identity/**
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - Identity/**

jobs:
  format:
    name: Format
    uses: ./.github/workflows/dotnet-format.yaml
    with:
      project-directory: Identity

  sonar-scan:
    name: Sonarqube Scan
    needs: Format
    uses: ./.github/workflows/backend-sonar-scan.yaml
    with:
      project-directory: Identity
    secrets:
      SONAR_TOKEN: ${{ secrets.IDENTITY_SONAR_TOKEN }}
