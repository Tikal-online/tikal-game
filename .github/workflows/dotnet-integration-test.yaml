---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Integration Tests

on:
  workflow_call:
    inputs:
      project-directory:
        required: true
        type: string

jobs:
  unit-test:
    name: Integration Tests
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          lfs: true

      - name: Setup dotnet
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: "${{ inputs.project-directory }}/${{ inputs.project-directory }}.IntegrationTests/packages.lock.json"

      - name: Restore projects
        run: dotnet restore ${{ inputs.project-directory }}/${{ inputs.project-directory }}.IntegrationTests --locked-mode

      - name: Build projects
        run: dotnet build ${{ inputs.project-directory }}/${{ inputs.project-directory }}.IntegrationTests --no-restore

      - name: Run Integration Tests
        run: |
          dotnet test \
            --project ${{ inputs.project-directory }}/${{ inputs.project-directory }}.IntegrationTests \
            --coverlet \
            --coverlet-output-format opencover \
            --results-directory TestResults/IntegrationTests \
            --no-build

      - name: Upload test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ inputs.project-directory }}-integration-test-coverage
          path: TestResults
        if: ${{ always() }}
