---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Backend CI/CD

on:
  push:
    paths:
      - Tikal-Backend/**

jobs:
  format:
    name: Format
    uses: ./.github/workflows/dotnet-format.yaml
    with:
      project-directory: Tikal-Backend

  sonar-scan:
    name: Sonarqube Scan
    needs: Format
    uses: ./.github/workflows/dotnet-sonar-scan.yaml
    with:
      project-directory: Tikal-Backend
    secrets:
      SONAR_TOKEN: ${{ secrets.TIKAL_BACKEND_SONAR_TOKEN }}

  release:
    name: Release
    needs: Sonar-Scan
    permissions:
      contents: write
    if: github.ref == 'refs/heads/main'
    uses: ./.github/workflows/create-release.yaml
    with:
      project-directory: Tikal-Backend
      project-name: tikal-backend
