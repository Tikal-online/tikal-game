---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Sonarqube Scan

on:
  workflow_call:
    inputs:
      project-directory:
        required: true
        type: string

jobs:
  sonarqube-scan:
    name: Sonarqube Scan
    runs-on: ubuntu-24.04
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: 17
          distribution: "zulu"

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          lfs: true

      - name: Cache SonarQube Cloud packages
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ~\sonar\cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache SonarQube Cloud scanner
        id: cache-sonar-scanner
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: .\.sonar\scanner
          key: ${{ runner.os }}-sonar-scanner
          restore-keys: ${{ runner.os }}-sonar-scanner

      - name: Setup dotnet
        uses: actions/setup-dotnet@baa11fbfe1d6520db94683bd5c7a3818018e4309 # v5.1.0
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: "${{ inputs.project-directory }}/**/packages.lock.json"

      - name: Install SonarQube Cloud scanner
        if: steps.cache-sonar-scanner.outputs.cache-hit != 'true'
        run: |
          dotnet tool update dotnet-sonarscanner -g

      - name: Begin SonarQube Analysis
        env:
          SONAR_TOKEN: ${{ secrets.IDENTITY_SONAR_TOKEN }}
        run: |
          dotnet-sonarscanner begin /k:"Identity" /o:"tikal-online" /d:sonar.token="${{ secrets.IDENTITY_SONAR_TOKEN }}"

      - name: Restore projects
        run: |
          dotnet restore ${{ inputs.project-directory }} --locked-mode
          dotnet restore ${{ inputs.project-directory }}/Modules --locked-mode

      - name: Build projects
        run: |
          dotnet build ${{ inputs.project-directory }} --no-restore
          dotnet build ${{ inputs.project-directory }}/Modules --no-restore

      - name: End SonarQube Analysis
        env:
          SONAR_TOKEN: ${{ secrets.IDENTITY_SONAR_TOKEN }}
        run: |
          dotnet-sonarscanner end /d:sonar.token="${{ secrets.IDENTITY_SONAR_TOKEN }}"
