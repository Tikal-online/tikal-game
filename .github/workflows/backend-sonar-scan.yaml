---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Sonarqube Scan

on:
  workflow_call:
    inputs:
      project-directory:
        required: true
        type: string
    secrets:
      IDENTITY_SONAR_TOKEN:
        required: true

jobs:
  sonarqube-scan:
    name: Sonarqube Scan
    runs-on: ubuntu-24.04
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: 17
          distribution: "zulu"

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          lfs: true

      - name: Cache SonarQube Cloud packages
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ~\.sonar\cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache SonarQube Cloud scanner
        id: cache-sonar-scanner
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ${{ github.workspace }}\.sonar\scanner
          key: ${{ runner.os }}-sonar-scanner
          restore-keys: ${{ runner.os }}-sonar-scanner

      - name: Setup dotnet
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: "${{ inputs.project-directory }}/**/packages.lock.json"

      - name: Install SonarQube Cloud scanner
        if: steps.cache-sonar-scanner.outputs.cache-hit != 'true'
        run: |
          dotnet tool update dotnet-sonarscanner -g

      - name: Begin SonarQube Analysis
        env:
          SONAR_TOKEN: ${{ secrets.IDENTITY_SONAR_TOKEN }}
        run: |
          dotnet-sonarscanner begin \
            /k:"${{ inputs.project-directory }}" \
            /o:"fmahdi09" \
            /d:sonar.token="$SONAR_TOKEN" \
            /d:sonar.scanner.scanAll=false

      - name: Restore projects
        run: |
          dotnet restore ${{ inputs.project-directory }} --locked-mode
          dotnet restore ${{ inputs.project-directory }}/Modules --locked-mode

      - name: Build projects
        run: |
          dotnet build ${{ inputs.project-directory }} --no-restore
          dotnet build ${{ inputs.project-directory }}/Modules --no-restore

      - name: End SonarQube Analysis
        env:
          SONAR_TOKEN: ${{ secrets.IDENTITY_SONAR_TOKEN }}
        run: |
          dotnet-sonarscanner end /d:sonar.token="$SONAR_TOKEN"

      - name: Create SonarQube Summary
        if: github.ref == 'refs/heads/main'
        env:
          SONAR_HOST_URL: https://sonarcloud.io
          SONAR_TOKEN: ${{ secrets.IDENTITY_SONAR_TOKEN }}
          SONAR_PROJECT_KEY: ${{ inputs.project-directory }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          QG_RESPONSE=$(curl -s -u "$SONAR_TOKEN:" \
            "$SONAR_HOST_URL/api/qualitygates/project_status?projectKey=$SONAR_PROJECT_KEY&branch=main")

          QG_STATUS=$(echo "$QG_RESPONSE" | jq -r '.projectStatus.status')

          MEASURES_RESPONSE=$(curl -s -u "$SONAR_TOKEN:" \
            "$SONAR_HOST_URL/api/measures/component?component=$SONAR_PROJECT_KEY&branch=main&metricKeys=bugs,vulnerabilities,code_smells,coverage,duplicated_lines_density,ncloc,security_hotspots,reliability_rating,security_rating,sqale_rating")

          extract() {
            echo "$MEASURES_RESPONSE" | jq -r --arg key "$1" \
              '.component.measures[] | select(.metric == $key) | .value // "N/A"'
          }

          BUGS=$(extract bugs)
          VULNS=$(extract vulnerabilities)
          SMELLS=$(extract code_smells)
          COVERAGE=$(extract coverage)
          DUPLICATION=$(extract duplicated_lines_density)
          LINES=$(extract ncloc)
          HOTSPOTS=$(extract security_hotspots)

          # Convert letter ratings (1=A, 2=B, 3=C, 4=D, 5=E)
          rating() {
            case "$1" in
              1.0) echo "A" ;; 2.0) echo "B" ;; 3.0) echo "C" ;;
              4.0) echo "D" ;; 5.0) echo "E" ;; *) echo "N/A" ;;
            esac
          }

          RELIABILITY=$(rating "$(extract reliability_rating)")
          SECURITY=$(rating "$(extract security_rating)")
          MAINTAINABILITY=$(rating "$(extract sqale_rating)")

          if [ "$QG_STATUS" = "OK" ]; then
            BADGE="✅ **Passed**"
          elif [ "$QG_STATUS" = "WARN" ]; then
            BADGE="⚠️ **Warning**"
          else
            BADGE="❌ **Failed**"
          fi

          cat >> "$GITHUB_STEP_SUMMARY" << EOF
          ## 🔍 SonarQube Analysis

          **Quality Gate:** $BADGE
          **Commit:** \`${COMMIT_SHA:0:7}\`

          ### Metrics

          | Metric                   | Value             |
          |--------------------------|-------------------|
          | 🐛 Bugs                  | $BUGS             |
          | 🔒 Vulnerabilities       | $VULNS            |
          | 🔥 Security Hotspots     | $HOTSPOTS         |
          | 🧹 Code Smells           | $SMELLS           |
          | 🧪 Coverage              | ${COVERAGE}%      |
          | 🔁 Duplication           | ${DUPLICATION}%   |
          | 📏 Lines of Code         | $LINES            |

          ### Ratings

          | Area                | Rating  |
          |---------------------|---------|
          | 🛡️ Reliability      | $RELIABILITY |
          | 🔐 Security         | $SECURITY    |
          | 🔧 Maintainability  | $MAINTAINABILITY |

          [View Full Report]($SONAR_HOST_URL/dashboard?id=$SONAR_PROJECT_KEY&branch=main)
          EOF
