---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Migrate BFF Database

on:
  workflow_call:
    secrets:
      AZURE_CREDENTIALS:
        required: true
    inputs:
      project-directory:
        required: true
        type: string
      keyvault-name:
        required: true
        type: string

env:
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

jobs:
  migrate:
    name: Migrate Database
    runs-on: tikal-azure-runner
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          lfs: true

      - name: Setup dotnet
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: "${{ inputs.project-directory }}/**/packages.lock.json"

      - name: Install dotnet-ef
        run: dotnet tool install --global dotnet-ef

      - name: Restore projects
        run: dotnet restore ${{ inputs.project-directory }} --locked-mode

      - name: Build projects
        run: dotnet build ${{ inputs.project-directory }} --no-restore

      - name: Create session migration bundle
        run: |
          dotnet ef migrations bundle \
            --context "SessionDbContext" \
            --startup-project "${{ inputs.project-directory }}" \
            --project "${{ inputs.project-directory }}" \
            --output "session-efbundle"

      - name: Create data protection migration bundle
        run: |
          dotnet ef migrations bundle \
            --context "DataProtectionDbContext" \
            --startup-project "${{ inputs.project-directory }}" \
            --project "${{ inputs.project-directory }}" \
            --output "data-protection-efbundle"

      - name: Copy appsettings to working directory
        run: cp ${{ inputs.project-directory }}/appsettings.json .

      - name: Setup Azure CLI
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Retrieve database connection string from Key Vault
        id: keyvault
        uses: azure/cli@9eb25b8360668fb0ecbafa808d40e2197b2f5f52 # v3.0.0
        with:
          inlineScript: |
            DB_NAME=$(az keyvault secret show --name Database--DatabaseName --vault-name ${{ inputs.keyvault-name }} --query value -o tsv)
            echo "::add-mask::$DB_NAME"
            echo "DB_NAME=$DB_NAME" >> $GITHUB_ENV
            DB_HOST=$(az keyvault secret show --name Database--Host --vault-name ${{ inputs.keyvault-name }} --query value -o tsv)
            echo "::add-mask::$DB_HOST"
            echo "DB_HOST=$DB_HOST" >> $GITHUB_ENV
            DB_PASSWORD=$(az keyvault secret show --name Database--Password --vault-name ${{ inputs.keyvault-name }} --query value -o tsv)
            echo "::add-mask::$DB_PASSWORD"
            echo "DB_PASSWORD=$DB_PASSWORD" >> $GITHUB_ENV
            DB_PORT=$(az keyvault secret show --name Database--Port --vault-name ${{ inputs.keyvault-name }} --query value -o tsv)
            echo "::add-mask::$DB_PORT"
            echo "DB_PORT=$DB_PORT" >> $GITHUB_ENV
            DB_USERNAME=$(az keyvault secret show --name Database--Username --vault-name ${{ inputs.keyvault-name }} --query value -o tsv)
            echo "::add-mask::$DB_USERNAME"
            echo "DB_USERNAME=$DB_USERNAME" >> $GITHUB_ENV

      - name: Apply session migrations
        run: |
          ./session-efbundle \
            --connection "Server=${{ env.DB_HOST }};Database=${{ env.DB_NAME }};Port=${{ env.DB_PORT }};User Id=${{ env.DB_USERNAME }};Password=${{ env.DB_PASSWORD }};Ssl Mode=Require;"

      - name: Apply data protection migrations
        run: |
          ./data-protection-efbundle \
            --connection "Server=${{ env.DB_HOST }};Database=${{ env.DB_NAME }};Port=${{ env.DB_PORT }};User Id=${{ env.DB_USERNAME }};Password=${{ env.DB_PASSWORD }};Ssl Mode=Require;"
