---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Deploy Release

on:
  workflow_call:
    inputs:
      dockerfile:
        required: true
        type: string
      version:
        required: true
        type: string
      project-name:
        required: true
        type: string

env:
  AZ_REGISTRY: "tikalcontainerregistry.azurecr.io"

jobs:
  deploy-release:
    name: Deploy Release
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          lfs: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to the Azure Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ${{ env.AZ_REGISTRY }}
          username: ${{ secrets.AZ_SP_CLIENT_ID }}
          password: ${{ secrets.AZ_SP_CLIENT_SECRET }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf #v6.0.0
        with:
          images: ${{ env.AZ_REGISTRY }}/${{ inputs.project-name }}
          tags: |
            type=semver,pattern={{version}},value=${{ inputs.version }}

      - name: Build and Push Image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          file: ${{ inputs.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
