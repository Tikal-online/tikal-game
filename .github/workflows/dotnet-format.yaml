---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Format

on:
  workflow_call:
    inputs:
      project-directory:
        required: true
        type: string

env:
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

jobs:
  format:
    name: Enforce Formatting
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          lfs: true

      - name: Setup dotnet
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: "${{ inputs.project-directory }}/**/packages.lock.json"

      - name: Restore projects
        run: dotnet restore ${{ inputs.project-directory }} --locked-mode

      - name: Enforce formatting
        run: dotnet format ${{ inputs.project-directory }} whitespace --verify-no-changes --no-restore
