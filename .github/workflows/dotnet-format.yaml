---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Format

on:
  workflow_call:
    inputs:
      project-directory:
        required: true
        type: string

env:
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

jobs:
  format:
    name: Enforce Formatting
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          lfs: true

      - name: Setup dotnet
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: "${{ inputs.project-directory }}/**/packages.lock.json"

      - name: Restore projects
        run: dotnet restore ${{ inputs.project-directory }} --locked-mode

      - name: Enforce formatting
        run: dotnet format ${{ inputs.project-directory }} whitespace --verify-no-changes --no-restore
