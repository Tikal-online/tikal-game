---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Unit Tests

on:
  workflow_call:
    inputs:
      project-directory:
        required: true
        type: string

jobs:
  unit-test:
    name: Unit Tests
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          lfs: true

      - name: Setup dotnet
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: "${{ inputs.project-directory }}/**/*.Tests/packages.lock.json"

      - name: Restore projects
        run: dotnet restore ${{ inputs.project-directory }}/Modules --locked-mode

      - name: Build projects
        run: dotnet build ${{ inputs.project-directory }}/Modules --no-restore

      - name: Run Unit Tests
        run: |
          dotnet test \
            --solution ${{ inputs.project-directory }}/Modules/Tests.slnf \
            --coverlet \
            --coverlet-output-format opencover \
            --results-directory TestResults/UnitTests \
            --no-build

      - name: Upload test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ inputs.project-directory }}-unit-test-coverage
          path: TestResults
        if: ${{ always() }}
