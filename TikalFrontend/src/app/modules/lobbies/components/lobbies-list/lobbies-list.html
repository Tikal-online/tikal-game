<p class="header-prefix">ACTIVE EXPEDITIONS</p>
<h1>EXPEDITION LOBBIES</h1>
<div class="table-container">
  <table>
    <tr>
      <th>LOBBY NAME</th>
      <th>PLAYERS</th>
      <th>GAME MODE</th>
    </tr>
    @for (lobby of lobbySummaryStore.lobbies(); track $index) {
      <tr>
        <td class="lobby-name">
          <svg lucideGlobe [size]="12"></svg>
          {{ lobby.name }}
        </td>
        <td class="players">
          <svg lucideUsers [size]="12"></svg>
          {{ lobby.currentPlayers }}/{{ lobby.maxPlayers }}
        </td>
        <td>-</td>
      </tr>
    }
  </table>
</div>
<div class="pagination">
  <button
    class="button-secondary"
    type="button"
    [disabled]="!lobbySummaryStore.hasPrevious()"
    (click)="decrementPageNumber()"
  >
    <svg lucideChevronLeft [size]="13"></svg>
  </button>
  {{ lobbySummaryStore.filter.pageNumber() }} / {{ lobbySummaryStore.maxPage() }}
  <button
    class="button-secondary"
    type="button"
    [disabled]="!lobbySummaryStore.hasNext()"
    (click)="incrementPageNumber()"
  >
    <svg lucideChevronRight [size]="13"></svg>
  </button>
</div>
