@if (showChat()) {
  <div animate.enter="expand-animation" animate.leave="collapse-animation" class="expanded">
    <div class="header">
      <p>Global Chat</p>
      <div class="header-icons">
        <svg
          class="clickable-icon"
          lucideX
          tabindex="0"
          [size]="16"
          (click)="hide()"
          (keydown.enter)="hide()"
        ></svg>
      </div>
    </div>
  </div>
} @else {
  <div
    animate.enter="appear-after-delay"
    class="collapsed"
    tabindex="0"
    (click)="show()"
    (keydown.enter)="show()"
  >
    <svg lucideMessageSquare [size]="15"></svg>
  </div>
}
