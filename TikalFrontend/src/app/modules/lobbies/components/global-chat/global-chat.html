@if (showChat()) {
  <div class="expanded">
    <div class="header">
      <p>Global Chat</p>
      <div class="header-icons">
        <svg
          class="clickable-icon"
          lucideX
          tabindex="0"
          [size]="16"
          (click)="hide()"
          (keydown.enter)="hide()"
        ></svg>
      </div>
    </div>
    <div class="messages"></div>
    <form>
      <label for="message" hidden>Message</label>
      <input id="message" placeholder="Say something..." type="text" />
      <button class="button-primary" type="submit">
        <svg lucideSendHorizontal [size]="14"></svg>
      </button>
    </form>
  </div>
} @else {
  <div class="collapsed" tabindex="0" (click)="show()" (keydown.enter)="show()">
    <svg lucideMessageSquare [size]="15"></svg>
  </div>
}
