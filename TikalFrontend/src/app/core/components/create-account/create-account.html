<ng-container *transloco="let t; prefix: 'createAccount'">
  <dialog class="create-account-card">
    <p class="header-prefix">{{ t('header-prefix') }}</p>
    <h1>{{ t('header') }}</h1>
    <p class="description">{{ t('description') }}</p>
    <form [formRoot]="accountForm">
      <label for="name" hidden>{{ t('name-input-label') }}</label>
      <input autofocus id="name" type="text" [formField]="accountForm.name" />
      <div class="button-container">
        <button
          class="button-secondary"
          routerLink="/"
          type="button"
          [disabled]="accountForm().submitting()"
        >
          {{ t('cancel-button') }}
        </button>
        <button
          class="button-primary"
          type="submit"
          [disabled]="accountForm().invalid() || accountForm().submitting()"
        >
          @if (accountForm().submitting()) {
            <svg class="spin-animation" lucideLoaderCircle [size]="14"></svg>
            {{ t('submitting-button') }}
          } @else {
            {{ t('submit-button') }}
          }
        </button>
      </div>
    </form>
  </dialog>
</ng-container>
